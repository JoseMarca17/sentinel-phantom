<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL PHANTOM - Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #000; color: #00d4ff; font-family: 'Courier New', monospace; margin: 20px; }
        .header { border-bottom: 2px solid #00d4ff; padding-bottom: 10px; margin-bottom: 20px; }
        .terminal { background: #001219; border: 1px solid #00d4ff; padding: 20px; height: 300px; overflow-y: scroll; box-shadow: 0 0 15px #00d4ff; }
        .status-card { display: inline-block; padding: 10px; border: 1px solid #fff; margin-right: 10px; }
        .alert { color: #fff; background: #005f73; padding: 5px; margin: 5px 0; border-left: 5px solid #00d4ff; }
        h1 { color: #fff; text-transform: uppercase; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Sentinel Phantom v1.0</h1>
        <div class="status-card">SISTEMA: EN LÍNEA</div>
        <div class="status-card">MODO: AUDITORÍA TÁCTICA</div>
    </div>

    <h3>LOGS DE CAPA FÍSICA (RFID/WiFi/BT)</h3>
    <div id="logs" class="terminal">
        <div class="alert">[*] Esperando eventos de hardware...</div>
    </div>

    <script>
        const socket = io();
        const logsDiv = document.getElementById('logs');

        socket.on('new_event', function(data) {
            const entry = document.createElement('div');
            entry.className = 'alert';
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] [${data.type}] ${data.payload.msg}`;
            logsDiv.prepend(entry);
        });
        socket.on('new_event', function(data) {
    if (data.type === "WIFI_DETECTED") {
        const logsDiv = document.getElementById('logs');
        const entry = document.createElement('div');
        entry.className = 'alert';
        entry.style.borderLeft = "5px solid #ff0055"; // Color diferente para WiFi
        entry.innerHTML = `[WIFI] <b>${data.payload.data.ssid}</b> - Ch: ${data.payload.data.channel} (${data.payload.data.rssi} dBm)`;
        logsDiv.prepend(entry);
    }
});
    </script>
</body>
</html>
